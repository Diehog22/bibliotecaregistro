<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acervo Digital - UNAM</title>
    <style>
        :root { 
            --unam-azul: #003b5c; 
            --unam-oro: #fdbb30; 
            --hoja-amarilla: #fce5cd; 
            --gris-tabla: #d9d9d9;     
            --texto-rojo: #ff0000;    
        }
        
        body { margin: 0; font-family: 'Arial', sans-serif; background-color: #cbd5e0; }

        .header { 
            background: var(--unam-azul); 
            color: var(--unam-oro); 
            padding: 15px; 
            text-align: center; 
            border-bottom: 5px solid var(--unam-oro); 
            font-weight: bold;
            text-transform: uppercase;
        }

        .container { 
            max-width: 1100px; 
            margin: 20px auto; 
            background: white; 
            padding: 20px; 
            box-shadow: 8px 8px 0px rgba(0,0,0,0.1); 
            border: 1px solid #999;
        }

        /* --- BOTONES DE PESTAÑAS (TABS) --- */
        .tabs-container {
            display: flex;
            margin-bottom: 15px;
            border: 2px solid var(--unam-azul);
            border-radius: 5px;
            overflow: hidden;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            background: #eee;
            color: var(--unam-azul);
            font-size: 14px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--unam-azul);
            color: var(--unam-oro);
        }

        .search-box { 
            background: #f3f4f6; 
            padding: 15px; 
            display: flex; 
            gap: 10px; 
            border: 1px solid #ddd; 
            margin-bottom: 10px; 
        }

        input { flex-grow: 1; padding: 12px; border: 2px solid var(--unam-azul); font-size: 16px; }
        
        .btn-buscar { 
            background: var(--unam-azul); 
            color: var(--unam-oro); 
            border: 2px solid var(--unam-oro); 
            padding: 10px 20px; 
            cursor: pointer; 
            font-weight: bold;
        }

        #status { text-align: center; font-weight: bold; margin: 10px 0; color: green; }

        .view-content { display: none; }
        .view-content.active { display: block; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        
        th { background: var(--hoja-amarilla); border: 1px solid #999; padding: 10px; font-size: 13px; }
        td { border: 1px solid #ccc; padding: 10px; text-align: center; font-size: 14px; }

        /* Estilo Alumnos (igual a imagen.png) */
        .fila-alumno td { 
            background: var(--gris-tabla) !important; 
            font-weight: bold; 
            text-transform: uppercase; 
        }

        .rojo { color: var(--texto-rojo) !important; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">SISTEMA DE CONSULTA DE ACERVO - UNAM</div>

<div class="container">
    
    <!-- BOTONES NUEVOS -->
    <div class="tabs-container">
        <button id="btnL" class="tab-btn active" onclick="cambiarVista('libros')">📚 CONSULTAR LIBROS</button>
        <button id="btnA" class="tab-btn" onclick="cambiarVista('alumnos')">🎓 CONSULTAR ALUMNOS</button>
    </div>

    <div class="search-box">
        <input type="text" id="busqueda" placeholder="Buscar...">
        <button class="btn-buscar" onclick="buscar()">BUSCAR</button>
    </div>

    <div id="status">✅ CONECTADO AL ACERVO</div>

    <!-- TABLA LIBROS -->
    <div id="vista-libros" class="view-content active">
        <table>
            <thead>
                <tr>
                    <th>ID</th><th>LIBRO</th><th>AUTOR</th><th>AÑO</th><th>TOTALES</th><th>DISPONIBLES</th>
                </tr>
            </thead>
            <tbody id="resLibros"></tbody>
        </table>
    </div>

    <!-- TABLA ALUMNOS -->
    <div id="vista-alumnos" class="view-content">
        <table>
            <thead>
                <tr>
                    <th>ID-ESTUDIANTE</th><th>NOMBRE</th><th>RECARGOS</th><th>LIBROS PRESTADOS</th>
                </tr>
            </thead>
            <tbody id="resAlumnos"></tbody>
        </table>
    </div>
</div>

<script>
    const urlL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRxvn_OzvmwzYPuzfVCVgviDoVVMQkm75FwkiYPelVZkwh4sKMyFVevJsJXLuKNGCsZaDCM9V0WkK36/pub?output=csv';
    const urlA = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRxvn_OzvmwzYPuzfVCVgviDoVVMQkm75FwkiYPelVZkwh4sKMyFVevJsJXLuKNGCsZaDCM9V0WkK36/pub?gid=1494947260&single=true&output=csv';

    let baseL = [];
    let baseA = [];

    async function cargar() {
        const [rL, rA] = await Promise.all([fetch(urlL), fetch(urlA)]);
        baseL = procesar(await rL.text());
        baseA = procesar(await rA.text());
        render(baseL, baseA);
    }

    function procesar(txt) {
        return txt.split("\n").slice(1).map(f => f.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(v => v.replace(/"/g, "").trim())).filter(f => f.length > 1);
    }

    function cambiarVista(v) {
        document.getElementById('vista-libros').classList.toggle('active', v === 'libros');
        document.getElementById('vista-alumnos').classList.toggle('active', v === 'alumnos');
        document.getElementById('btnL').classList.toggle('active', v === 'libros');
        document.getElementById('btnA').classList.toggle('active', v === 'alumnos');
    }

    function buscar() {
        const t = document.getElementById('busqueda').value.toLowerCase();
        render(baseL.filter(l => l[1].toLowerCase().includes(t)), baseA.filter(a => a[1].toLowerCase().includes(t)));
    }

    function render(libros, alumnos) {
        document.getElementById('resLibros').innerHTML = libros.map(l => `<tr><td>${l[0]}</td><td class="rojo" style="text-align:left">${l[1]}</td><td class="rojo">${l[2]}</td><td>${l[3]}</td><td class="rojo">${l[4]}</td><td class="rojo">${l[5]}</td></tr>`).join('');
        document.getElementById('resAlumnos').innerHTML = alumnos.map(a => `<tr class="fila-alumno"><td>${a[0]}</td><td>${a[1]}</td><td class="${a[2]=='SÍ'?'rojo':''}">${a[2]}</td><td class="rojo">${a[3]}</td></tr>`).join('');
    }

    window.onload = cargar;
</script>
</body>
</html>
