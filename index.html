<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acervo Digital - UNAM</title>
    <style>
        :root { 
            --unam-azul: #003b5c; 
            --unam-oro: #fdbb30; 
            --hoja-amarilla: #fce5cd; /* Color encabezado imagen.png */
            --gris-tabla: #d9d9d9;     /* Color celdas imagen.png */
            --texto-rojo: #ff0000;    
        }
        
        body { 
            margin: 0; 
            font-family: 'Arial', sans-serif; 
            background-color: #cbd5e0; 
        }

        .header { 
            background: var(--unam-azul); 
            color: var(--unam-oro); 
            padding: 15px; 
            text-align: center; 
            border-bottom: 5px solid var(--unam-oro); 
            font-weight: bold;
            text-transform: uppercase;
        }

        .container { 
            max-width: 1100px; 
            margin: 20px auto; 
            background: white; 
            padding: 20px; 
            box-shadow: 8px 8px 0px rgba(0,0,0,0.1); 
        }

        .search-box { 
            background: #f3f4f6; 
            padding: 15px; 
            display: flex; 
            gap: 10px; 
            border: 1px solid #ddd; 
            margin-bottom: 20px; 
        }

        input { flex-grow: 1; padding: 12px; border: 2px solid var(--unam-azul); font-size: 16px; }
        
        button { 
            background: var(--unam-azul); 
            color: var(--unam-oro); 
            border: 2px solid var(--unam-oro); 
            padding: 10px 20px; 
            cursor: pointer; 
            font-weight: bold;
        }

        #status { text-align: center; font-weight: bold; margin: 10px 0; }

        .seccion-label {
            background: var(--unam-azul);
            color: var(--unam-oro);
            padding: 8px 15px;
            margin-top: 25px;
            font-size: 14px;
            font-weight: bold;
            display: none;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; display: none; }
        
        /* Estilo Tabla Libros (Hoja 1) */
        #tablaLibros th { background: var(--hoja-amarilla); border: 1px solid #999; padding: 12px; }
        #tablaLibros td { border: 1px solid #ccc; padding: 10px; text-align: center; }

        /* Estilo Tabla Alumnos (Hoja 2 - Según imagen.png) */
        #tablaAlumnos th { 
            background: var(--hoja-amarilla); 
            border: 1px solid #999; 
            padding: 12px; 
            color: black;
        }
        #tablaAlumnos td { 
            background: var(--gris-tabla); 
            border: 1px solid #b7b7b7; 
            padding: 10px; 
            text-align: center; 
            font-weight: bold;
            text-transform: uppercase;
            color: #333;
        }

        .rojo-negrita { color: var(--texto-rojo) !important; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">SISTEMA DE CONSULTA INTEGRADO - UNAM</div>

<div class="container">
    <div class="search-box">
        <input type="text" id="busqueda" placeholder="Buscar por título, autor o nombre de alumno...">
        <button onclick="buscar()">BUSCAR</button>
    </div>

    <div id="status">⏳ Sincronizando con Google Sheets...</div>

    <!-- TABLA DE LIBROS -->
    <div id="labelLibros" class="seccion-label">RESULTADOS EN ACERVO (LIBROS)</div>
    <table id="tablaLibros">
        <thead>
            <tr>
                <th>ID</th><th>LIBRO</th><th>AUTOR</th><th>AÑO</th><th>TOTAL</th><th>DISP.</th>
            </tr>
        </thead>
        <tbody id="cuerpoLibros"></tbody>
    </table>

    <!-- TABLA DE ALUMNOS (Hoja 2) -->
    <div id="labelAlumnos" class="seccion-label">ESTATUS DE PRÉSTAMOS (ALUMNOS)</div>
    <table id="tablaAlumnos">
        <thead>
            <tr>
                <th>ID-ESTUDIANTE</th>
                <th>NOMBRE</th>
                <th>RECARGOS</th>
                <th>LIBROS PRESTADOS</th>
            </tr>
        </thead>
        <tbody id="cuerpoAlumnos"></tbody>
    </table>
</div>

<script>
    // Enlaces proporcionados por el usuario
    const urlLibros = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRxvn_OzvmwzYPuzfVCVgviDoVVMQkm75FwkiYPelVZkwh4sKMyFVevJsJXLuKNGCsZaDCM9V0WkK36/pub?output=csv';
    const urlAlumnos = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRxvn_OzvmwzYPuzfVCVgviDoVVMQkm75FwkiYPelVZkwh4sKMyFVevJsJXLuKNGCsZaDCM9V0WkK36/pub?gid=1494947260&single=true&output=csv';

    let baseLibros = [];
    let baseAlumnos = [];

    async function cargarBasesDeDatos() {
        try {
            const [resL, resA] = await Promise.all([fetch(urlLibros), fetch(urlAlumnos)]);
            baseLibros = procesarCSV(await resL.text());
            baseAlumnos = procesarCSV(await resA.text());

            document.getElementById('status').innerHTML = "✅ SISTEMA CONECTADO A HOJA 1 Y HOJA 2";
            document.getElementById('status').style.color = "green";
        } catch (e) {
            document.getElementById('status').innerHTML = "❌ ERROR AL CONECTAR CON LAS TABLAS";
            document.getElementById('status').style.color = "red";
        }
    }

    function procesarCSV(data) {
        return data.split("\n").slice(1).map(f => {
            return f.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(v => v.replace(/"/g, "").trim());
        }).filter(fila => fila.length > 1);
    }

    function buscar() {
        const txt = document.getElementById('busqueda').value.toLowerCase().trim();
        if(!txt) return;

        // Filtrar Libros (por Título o Autor)
        const librosMatch = baseLibros.filter(l => l[1].toLowerCase().includes(txt) || l[2].toLowerCase().includes(txt));
        
        // Filtrar Alumnos (por ID o Nombre)
        const alumnosMatch = baseAlumnos.filter(a => a[0].toLowerCase().includes(txt) || a[1].toLowerCase().includes(txt));

        renderLibros(librosMatch);
        renderAlumnos(alumnosMatch);
    }

    function renderLibros(lista) {
        const tabla = document.getElementById('tablaLibros');
        const label = document.getElementById('labelLibros');
        const cuerpo = document.getElementById('cuerpoLibros');
        cuerpo.innerHTML = "";

        if (lista.length > 0) {
            tabla.style.display = "table";
            label.style.display = "block";
            lista.forEach(l => {
                cuerpo.innerHTML += `<tr><td>${l[0]}</td><td>${l[1]}</td><td>${l[2]}</td><td>${l[3]}</td><td>${l[4]}</td><td class="rojo-negrita">${l[5]}</td></tr>`;
            });
        } else {
            tabla.style.display = "none";
            label.style.display = "none";
        }
    }

    function renderAlumnos(lista) {
        const tabla = document.getElementById('tablaAlumnos');
        const label = document.getElementById('labelAlumnos');
        const cuerpo = document.getElementById('cuerpoAlumnos');
        cuerpo.innerHTML = "";

        if (lista.length > 0) {
            tabla.style.display = "table";
            label.style.display = "block";
            lista.forEach(a => {
                const claseRecargo = (a[2] || "").toUpperCase() === "SÍ" ? "rojo-negrita" : "";
                cuerpo.innerHTML += `
                    <tr>
                        <td>${a[0]}</td>
                        <td>${a[1]}</td>
                        <td class="${claseRecargo}">${a[2]}</td>
                        <td class="rojo-negrita">${a[3]}</td>
                    </tr>`;
            });
        } else {
            tabla.style.display = "none";
            label.style.display = "none";
        }
    }

    window.onload = cargarBasesDeDatos;
    document.getElementById("busqueda").addEventListener("keypress", (e) => { if(e.key === "Enter") buscar(); });
</script>

</body>
</html>
