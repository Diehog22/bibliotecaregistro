<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acervo Digital - UNAM</title>
    <style>
        :root { 
            --unam-azul: #003b5c; 
            --unam-oro: #fdbb30; 
            --hoja-amarilla: #fce5cd; 
            --gris-tabla: #d9d9d9;     
            --texto-rojo: #ff0000;    
        }
        
        body { margin: 0; font-family: 'Arial', sans-serif; background-color: #cbd5e0; }

        /* --- ENCABEZADO --- */
        .header { 
            background: var(--unam-azul); 
            color: var(--unam-oro); 
            padding: 20px; 
            text-align: center; 
            border-bottom: 5px solid var(--unam-oro); 
            font-weight: bold;
            font-size: 22px;
            text-transform: uppercase;
        }

        .container { 
            max-width: 1100px; 
            margin: 20px auto; 
            background: white; 
            padding: 25px; 
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1); 
            border-radius: 8px;
        }

        /* --- DISEÑO DE LOS BOTONES (TABS) --- */
        .navegacion-principal {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #cbd5e0;
            color: #1e293b;
            text-transform: uppercase;
        }

        /* Cuando la pestaña está seleccionada */
        .tab-btn.active {
            background: var(--unam-azul);
            color: var(--unam-oro);
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transform: translateY(-2px);
            border-bottom: 4px solid var(--unam-oro);
        }

        .tab-btn:hover:not(.active) {
            background: #94a3b8;
        }

        /* --- BUSCADOR --- */
        .search-box { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 25px; 
        }

        input { flex-grow: 1; padding: 15px; border: 2px solid var(--unam-azul); font-size: 16px; border-radius: 5px; }
        
        .btn-buscar { 
            background: var(--unam-azul); 
            color: var(--unam-oro); 
            border: 2px solid var(--unam-oro); 
            padding: 10px 30px; 
            cursor: pointer; 
            font-weight: bold;
            border-radius: 5px;
        }

        #status { text-align: center; font-weight: bold; margin-bottom: 15px; color: #475569; }

        /* --- CONTENIDO DE LAS TABLAS --- */
        .view-content { display: none; }
        .view-content.active { display: block; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        
        th { background: var(--hoja-amarilla); border: 1px solid #999; padding: 12px; color: black; }

        /* Tabla Libros */
        #tablaLibros td { border: 1px solid #ccc; padding: 10px; text-align: center; }

        /* Tabla Estudiantes (Estilo imagen.png) */
        #tablaAlumnos td { 
            background: var(--gris-tabla); 
            border: 1px solid #b7b7b7; 
            padding: 10px; 
            text-align: center; 
            font-weight: bold;
            text-transform: uppercase;
        }

        .rojo { color: var(--texto-rojo) !important; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">SISTEMA BIBLIOTECARIO UNAM</div>

<div class="container">
    
    <!-- PESTAÑAS VISIBLES -->
    <div class="navegacion-principal">
        <button id="btn-libros" class="tab-btn active" onclick="cambiarPestana('libros')">📚 Ver Acervo (Hoja 1)</button>
        <button id="btn-estudiantes" class="tab-btn" onclick="cambiarPestana('estudiantes')">🎓 Ver Alumnos (Hoja 2)</button>
    </div>

    <div class="search-box">
        <input type="text" id="busqueda" placeholder="Buscar en la pestaña actual...">
        <button class="btn-buscar" onclick="buscar()">BUSCAR</button>
    </div>

    <div id="status">⏳ Cargando bases de datos de Google Sheets...</div>

    <!-- VISTA 1: LIBROS -->
    <div id="view-libros" class="view-content active">
        <table id="tablaLibros">
            <thead>
                <tr>
                    <th>ID</th><th>LIBRO</th><th>AUTOR</th><th>AÑO</th><th>TOTAL</th><th>DISPONIBLES</th>
                </tr>
            </thead>
            <tbody id="cuerpoLibros"></tbody>
        </table>
    </div>

    <!-- VISTA 2: ESTUDIANTES -->
    <div id="view-estudiantes" class="view-content">
        <table id="tablaAlumnos">
            <thead>
                <tr>
                    <th>ID-ESTUDIANTE</th>
                    <th>NOMBRE</th>
                    <th>RECARGOS</th>
                    <th>LIBROS PRESTADOS</th>
                </tr>
            </thead>
            <tbody id="cuerpoAlumnos"></tbody>
        </table>
    </div>
</div>

<script>
    const urlLibros = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRxvn_OzvmwzYPuzfVCVgviDoVVMQkm75FwkiYPelVZkwh4sKMyFVevJsJXLuKNGCsZaDCM9V0WkK36/pub?output=csv';
    const urlAlumnos = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRxvn_OzvmwzYPuzfVCVgviDoVVMQkm75FwkiYPelVZkwh4sKMyFVevJsJXLuKNGCsZaDCM9V0WkK36/pub?gid=1494947260&single=true&output=csv';

    let baseLibros = [];
    let baseAlumnos = [];
    let vistaActual = 'libros';

    async function cargarDatos() {
        try {
            const [resL, resA] = await Promise.all([fetch(urlLibros), fetch(urlAlumnos)]);
            baseLibros = procesarCSV(await resL.text());
            baseAlumnos = procesarCSV(await resA.text());
            document.getElementById('status').innerHTML = "✅ CONEXIÓN EXITOSA";
            document.getElementById('status').style.color = "green";
            mostrarResultados(baseLibros, baseAlumnos);
        } catch (e) {
            document.getElementById('status').innerHTML = "❌ ERROR AL CARGAR DATOS";
        }
    }

    function procesarCSV(data) {
        return data.split("\n").slice(1).map(f => {
            return f.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(v => v.replace(/"/g, "").trim());
        }).filter(fila => fila.length > 1);
    }

    function cambiarPestana(tipo) {
        vistaActual = tipo;
        
        // Actualizar botones
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if(tipo === 'libros') document.getElementById('btn-libros').classList.add('active');
        else document.getElementById('btn-estudiantes').classList.add('active');

        // Actualizar vistas
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + tipo).classList.add('active');
        
        // Limpiar buscador
        document.getElementById('busqueda').value = "";
        mostrarResultados(baseLibros, baseAlumnos);
    }

    function buscar() {
        const txt = document.getElementById('busqueda').value.toLowerCase().trim();
        const filtradosLibros = baseLibros.filter(l => l[1].toLowerCase().includes(txt) || l[2].toLowerCase().includes(txt));
        const filtradosAlumnos = baseAlumnos.filter(a => a[0].toLowerCase().includes(txt) || a[1].toLowerCase().includes(txt));
        mostrarResultados(filtradosLibros, filtradosAlumnos);
    }

    function mostrarResultados(libros, alumnos) {
        const cLibros = document.getElementById('cuerpoLibros');
        const cAlumnos = document.getElementById('cuerpoAlumnos');
        
        cLibros.innerHTML = libros.map(l => `
            <tr><td>${l[0]}</td><td>${l[1]}</td><td>${l[2]}</td><td>${l[3]}</td><td>${l[4]}</td><td class="rojo">${l[5]}</td></tr>
        `).join('');

        cAlumnos.innerHTML = alumnos.map(a => `
            <tr>
                <td>${a[0]}</td>
                <td>${a[1]}</td>
                <td class="${(a[2]||'').toUpperCase()==='SÍ' ? 'rojo' : ''}">${a[2]}</td>
                <td class="rojo">${a[3]}</td>
            </tr>
        `).join('');
    }

    window.onload = cargarDatos;
    document.getElementById("busqueda").addEventListener("keypress", (e) => { if(e.key === "Enter") buscar(); });
</script>

</body>
</html>
