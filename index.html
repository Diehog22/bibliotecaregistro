<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acervo Digital - UNAM</title>
    <style>
        :root { 
            --unam-azul: #003b5c; 
            --unam-oro: #fdbb30; 
            --hoja-amarilla: #fef3c7; /* Color de los encabezados en Sheets */
            --texto-rojo: #b30000;    /* El rojo de tus libros en la imagen */
        }
        
        body { 
            margin: 0; 
            padding: 0;
            font-family: 'Arial', sans-serif; 
            background-color: #cbd5e0; 
            overflow-x: hidden;
        }

        .banner-contenedor {
            width: 100%;
            height: 45px;
            margin: 0;
            padding: 0;
            overflow: hidden;
            border-bottom: 2px solid var(--unam-oro);
            background-color: var(--unam-azul);
        }

        .banner-contenedor img {
            width: 100%;
            height: 100%; 
            object-fit: cover; 
            object-position: center 20%;
            display: block;
            opacity: 0.7;
        }

        .header { 
            background: var(--unam-azul); 
            color: var(--unam-oro); 
            padding: 12px; 
            text-align: center; 
            border-bottom: 5px solid var(--unam-oro); 
            font-size: 18px; 
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container { 
            max-width: 1100px; 
            margin: 20px auto; 
            background: white; 
            padding: 20px; 
            border: 1px solid #999; 
            box-shadow: 8px 8px 0px rgba(0,0,0,0.1); 
        }

        .search-box { 
            background: #f3f4f6; 
            padding: 15px; 
            display: flex; 
            gap: 10px; 
            border: 1px solid #ddd; 
            margin-bottom: 20px; 
        }

        input { 
            flex-grow: 1; 
            padding: 12px; 
            border: 2px solid var(--unam-azul); 
            font-size: 16px; 
        }
        
        button { 
            background: var(--unam-azul); 
            color: var(--unam-oro); 
            border: 2px solid var(--unam-oro); 
            padding: 10px 20px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #002a42;
        }

        #status { 
            text-align: center; 
            font-weight: bold; 
            margin: 10px 0; 
            font-size: 14px;
        }
        
        /* --- ESTILOS DE LA TABLA "TIPO GOOGLE SHEETS" --- */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: white; 
            display: none; 
            margin-top: 10px;
            border: 1px solid #ccc;
        }

        th { 
            background: var(--hoja-amarilla); 
            border: 1px solid #999; 
            padding: 12px; 
            font-size: 13px; 
            color: #000; 
            text-transform: uppercase;
            font-weight: bold;
        }

        td { 
            border: 1px solid #ccc; 
            padding: 10px; 
            text-align: center; 
            color: #333; 
            font-size: 14px; 
        }

        /* Columna de TÍTULO: Roja y Negrita como en imagen.png */
        td:nth-child(2) {
            color: var(--texto-rojo);
            font-weight: bold;
            text-align: left; /* Los títulos suelen leerse mejor alineados a la izquierda */
        }

        /* Columna de AUTOR: También roja como en tu captura */
        td:nth-child(3) {
            color: var(--texto-rojo);
        }

        /* Estilo para los números en rojo */
        td:nth-child(5), td:nth-child(6) {
            color: var(--texto-rojo);
            font-weight: bold;
        }

        tr:nth-child(even) { background: #f9f9f9; }
        tr:hover { background: #fffde7; } /* Efecto sutil al pasar el mouse */
    </style>
</head>
<body>

<div class="banner-contenedor">
    <img src="biblio.jpg" alt="Detalle Mural UNAM" onerror="this.src='https://via.placeholder.com/1200x45?text=UNAM+ACERVO'">
</div>

<div class="header">SISTEMA DE CONSULTA DE ACERVO - UNAM</div>

<div class="container">
    <div class="search-box">
        <input type="text" id="busqueda" placeholder="Buscar por título, autor o tema...">
        <button onclick="buscar()">BUSCAR</button>
    </div>

    <div id="status">⏳ Cargando base de datos...</div>

    <table id="tablaLibros">
        <thead>
            <tr>
                <th>ID</th>
                <th>LIBRO</th>
                <th>AUTOR</th>
                <th>AÑO</th>
                <th>TOTALES</th>
                <th>DISPONIBLES</th>
            </tr>
        </thead>
        <tbody id="resultadoBody"></tbody>
    </table>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRxvn_OzvmwzYPuzfVCVgviDoVVMQkm75FwkiYPelVZkwh4sKMyFVevJsJXLuKNGCsZaDCM9V0WkK36/pub?output=csv';
    let baseDeDatos = [];

    async function cargarBiblioteca() {
        const status = document.getElementById('status');
        try {
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error();
            const data = await response.text();
            
            // Separar filas y limpiar comillas y espacios
            const filas = data.split("\n").slice(1);
            baseDeDatos = filas.map(f => {
                const c = f.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { 
                    id: (c[0] || "").replace(/"/g, "").trim(), 
                    titulo: (c[1] || "").replace(/"/g, "").trim(), 
                    autor: (c[2] || "").replace(/"/g, "").trim(), 
                    anio: (c[3] || "").replace(/"/g, "").trim(), 
                    total: (c[4] || "").replace(/"/g, "").trim(), 
                    disp: (c[5] || "").replace(/"/g, "").trim() 
                };
            }).filter(l => l.titulo);

            status.innerHTML = "✅ CONECTADO AL ACERVO";
            status.style.color = "green";
        } catch (e) {
            status.innerHTML = "❌ ERROR AL CARGAR DATOS";
            status.style.color = "red";
        }
    }

    function buscar() {
        const txt = document.getElementById('busqueda').value.toLowerCase().trim();
        const tabla = document.getElementById('tablaLibros');
        const cuerpo = document.getElementById('resultadoBody');
        
        if (baseDeDatos.length === 0) return;

        const filtrados = baseDeDatos.filter(l => 
            l.titulo.toLowerCase().includes(txt) || 
            l.autor.toLowerCase().includes(txt)
        );

        cuerpo.innerHTML = "";
        if (filtrados.length > 0) {
            tabla.style.display = "table";
            filtrados.forEach(l => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${l.id}</td>
                    <td>${l.titulo}</td>
                    <td>${l.autor}</td>
                    <td>${l.anio}</td>
                    <td>${l.total}</td>
                    <td>${l.disp}</td>
                `;
                cuerpo.appendChild(row);
            });
        } else {
            tabla.style.display = "none";
            alert("No se encontraron resultados.");
        }
    }

    window.onload = cargarBiblioteca;
    document.getElementById("busqueda").addEventListener("keypress", (e) => { if(e.key === "Enter") buscar(); });
</script>

</body>
</html>
